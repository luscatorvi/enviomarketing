<svg width="680" height="720" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- CENTRO: GitHub Actions -->
  <rect x="255" y="300" width="170" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="322" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">GitHub Actions</text>
  <text x="340" y="342" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Orquestrador central</text>

  <!-- TOPO: Workflow manual -->
  <rect x="220" y="150" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="172" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">workflow_dispatch</text>
  <text x="340" y="192" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Disparo manual pelo GitHub</text>
  <line x1="340" y1="206" x2="340" y2="300" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Inputs do workflow -->
  <rect x="60" y="68" width="180" height="68" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="150" y="90" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Inputs do workflow</text>
  <text x="150" y="108" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">modo_teste · dest_teste</text>
  <text x="150" y="124" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">linha_inicio · linha_fim</text>
  <path d="M150 136 Q150 178 220 178" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ESQUERDA: Repositório -->
  <rect x="28" y="298" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="118" y="320" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Repositório</text>
  <text x="118" y="340" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Arquivos da campanha</text>
  <line x1="208" y1="326" x2="255" y2="326" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- contatos.xlsx -->
  <rect x="28" y="200" width="130" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="93" y="220" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">contatos.xlsx</text>
  <text x="93" y="236" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">3.279 e-mails</text>
  <line x1="93" y1="244" x2="93" y2="298" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- config.py -->
  <rect x="28" y="380" width="130" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="93" y="400" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">config.py</text>
  <text x="93" y="416" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">SMTP · assunto · pausa</text>
  <line x1="93" y1="380" x2="93" y2="344" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- email_v5.html -->
  <rect x="176" y="380" width="130" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="241" y="400" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">email_v5.html</text>
  <text x="241" y="416" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Template do e-mail</text>
  <line x1="241" y1="380" x2="241" y2="344" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- DIREITA: disparar_email.py -->
  <rect x="472" y="298" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="562" y="320" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">disparar_email.py</text>
  <text x="562" y="340" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Lê planilha e envia</text>
  <line x1="425" y1="326" x2="472" y2="326" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- GitHub Secrets -->
  <rect x="472" y="200" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="562" y="222" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">GitHub Secrets</text>
  <text x="562" y="242" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">EMAIL_FROM · EMAIL_PASS</text>
  <line x1="562" y1="256" x2="562" y2="298" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- BAIXO: Outlook SMTP -->
  <rect x="220" y="460" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="482" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Outlook 365 SMTP</text>
  <text x="340" y="502" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">smtp.office365.com · porta 587</text>
  <line x1="340" y1="356" x2="340" y2="460" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Limites -->
  <rect x="472" y="460" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="562" y="482" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Limites</text>
  <text x="562" y="502" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">10k/dia · 30/min</text>
  <line x1="460" y1="488" x2="472" y2="488" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Destinatários -->
  <rect x="220" y="570" width="240" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="592" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">3.279 destinatários</text>
  <text x="340" y="612" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">Dividido em lotes ou envio único</text>
  <line x1="340" y1="516" x2="340" y2="570" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Log -->
  <rect x="28" y="460" width="170" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="113" y="482" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Log de envios</text>
  <text x="113" y="502" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Artifact · 30 dias</text>
  <line x1="255" y1="356" x2="200" y2="460" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
