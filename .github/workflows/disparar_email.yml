name: Via Star — Disparo Expo Revestir 2026

on:
  workflow_dispatch:
    inputs:
      modo_teste:
        description: "Modo teste? (true = loga sem enviar)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      destinatario_teste:
        description: "E-mail para teste (opcional)"
        required: false
        default: ""
      linha_inicio:
        description: "Linha inicial do envio (1 = primeiro contato)"
        required: true
        default: "1"
      linha_fim:
        description: "Linha final do envio (0 = até o final)"
        required: true
        default: "0"

jobs:
  disparar:
    name: Disparar campanha
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Executar disparo
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          MODO_TESTE: ${{ github.event.inputs.modo_teste || 'false' }}
          DEST_TESTE: ${{ github.event.inputs.destinatario_teste || '' }}
          LINHA_INICIO: ${{ github.event.inputs.linha_inicio || '1' }}
          LINHA_FIM: ${{ github.event.inputs.linha_fim || '0' }}
        run: python disparar_email.py

      - name: Salvar log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-envio-${{ github.run_id }}
          path: "*.log"
          retention-days: 30
